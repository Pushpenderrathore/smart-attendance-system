<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Attendance System v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0d12;--surface:#12151e;--card:#181c28;--border:#222840;
      --accent:#4f8bff;--accent2:#7c3aed;--green:#22c55e;--red:#ef4444;
      --amber:#f59e0b;--text:#e8eaf0;--muted:#6b7280;
      --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.25;pointer-events:none;z-index:0}
    #root{position:relative;z-index:1}
    .app{max-width:480px;margin:0 auto;padding:0 16px 100px}

    /* Header */
    .header{padding:24px 0 16px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .logo-text{font-size:15px;font-weight:700;letter-spacing:.5px}
    .logo-sub{font-size:10px;color:var(--muted);font-family:var(--mono)}

    /* Tabs */
    .tab-bar{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:4px;margin:16px 0 24px}
    .tab{flex:1;padding:10px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
    .tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}

    /* Card */
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px;animation:fadeUp .3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .card-title{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:16px}

    /* Security badge row */
    .security-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .sec-chip{background:rgba(79,139,255,.08);border:1px solid rgba(79,139,255,.2);border-radius:6px;padding:4px 8px;font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--accent);font-family:var(--mono)}

    /* OTP Display */
    .otp-display{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center;position:relative;overflow:hidden}
    .otp-display::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(79,139,255,.08) 0%,transparent 60%);pointer-events:none}
    .otp-number{font-family:var(--mono);font-size:52px;font-weight:500;letter-spacing:14px;color:var(--accent);text-shadow:0 0 30px rgba(79,139,255,.4)}
    .otp-label{font-size:11px;color:var(--muted);margin-top:6px}

    /* Timer */
    .timer-wrap{margin-top:12px}
    .timer-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
    .timer-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s linear,background .3s;border-radius:2px}
    .timer-bar.danger{background:var(--red)}
    .timer-text{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;margin-top:4px}

    /* Fields */
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
    .field input,.field select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s}
    .field input:focus,.field select:focus{border-color:var(--accent)}
    .field input::placeholder{color:var(--muted)}
    .field select option{background:var(--surface)}
    .field .input-hint{font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--mono)}

    /* OTP digit input */
    .otp-input-row{display:flex;gap:8px;justify-content:center}
    .otp-digit{width:52px;height:60px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--mono);font-size:24px;text-align:center;outline:none;transition:border-color .2s,box-shadow .2s}
    .otp-digit:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,139,255,.15)}

    /* Attempt counter */
    .attempts-bar{display:flex;gap:5px;justify-content:center;margin-top:10px}
    .attempt-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
    .attempt-dot.used{background:var(--red)}
    .attempt-dot.ok{background:var(--green)}

    /* Buttons */
    .btn{width:100%;padding:14px;border-radius:12px;border:none;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
    .btn:active{transform:scale(.98)}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
    .btn-primary:hover{opacity:.9;box-shadow:0 4px 20px rgba(79,139,255,.3)}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
    .btn-outline:hover{border-color:var(--accent);color:var(--accent)}
    .btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red)}
    .btn-sm{width:auto;padding:8px 16px;font-size:12px}

    /* Badge */
    .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.5px}
    .badge.green{background:rgba(34,197,94,.12);color:var(--green)}
    .badge.red{background:rgba(239,68,68,.12);color:var(--red)}
    .badge.amber{background:rgba(245,158,11,.12);color:var(--amber)}
    .badge.blue{background:rgba(79,139,255,.12);color:var(--accent)}
    .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .dot.pulse{animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* Alert */
    .alert{padding:12px 16px;border-radius:12px;font-size:13px;display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
    .alert.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--green)}
    .alert.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red)}
    .alert.info{background:rgba(79,139,255,.1);border:1px solid rgba(79,139,255,.2);color:var(--accent)}
    .alert.warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--amber)}
    .alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}

    /* Stats */
    .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
    .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center}
    .stat-value{font-size:24px;font-weight:800}
    .stat-label{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.5px;text-transform:uppercase}

    /* Table */
    .att-table{width:100%;border-collapse:collapse}
    .att-table th{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
    .att-table td{padding:10px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
    .att-table tr:last-child td{border-bottom:none}
    .att-table tr.flagged td{background:rgba(239,68,68,.03)}
    .student-name{font-weight:600}
    .student-id{font-family:var(--mono);font-size:11px;color:var(--muted)}
    .dist{font-family:var(--mono);font-size:12px;color:var(--muted)}

    /* GPS Progress */
    .gps-step{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
    .gps-step-icon{font-size:18px;flex-shrink:0}
    .gps-step-label{font-size:13px;font-weight:600;flex:1}
    .gps-step-status{font-size:11px;color:var(--muted);font-family:var(--mono)}
    .gps-step.done .gps-step-label{color:var(--green)}
    .gps-step.active .gps-step-label{color:var(--accent)}
    .gps-step.fail .gps-step-label{color:var(--red)}

    /* GPS status */
    .gps-status{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;font-size:13px}
    .gps-coords{font-family:var(--mono);font-size:11px;color:var(--muted)}

    /* Session pill */
    .session-pill{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .session-info{font-size:13px;font-weight:600}
    .session-meta{font-size:11px;color:var(--muted);font-family:var(--mono)}

    /* User info bar */
    .user-bar{background:rgba(79,139,255,.06);border:1px solid rgba(79,139,255,.15);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .user-name{font-size:13px;font-weight:600}
    .user-role{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}

    /* Spinner */
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Success check */
    .success-check{width:72px;height:72px;border-radius:50%;background:rgba(34,197,94,.1);border:2px solid rgba(34,197,94,.3);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
    @keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

    .list-scroll{max-height:340px;overflow-y:auto}
    .list-scroll::-webkit-scrollbar{width:4px}
    .list-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .text-center{text-align:center}
    .mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
    .row{display:flex;gap:10px}.row .btn{flex:1}
    .flex-between{display:flex;align-items:center;justify-content:space-between}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, useCallback } = React;
const API = "http://localhost:5000";

// ── AUTH STORE ──────────────────────────────────────────────
const AuthStore = {
  getToken: ()   => localStorage.getItem("sas_token"),
  setToken: (t)  => localStorage.setItem("sas_token", t),
  getUser:  ()   => { try { return JSON.parse(localStorage.getItem("sas_user")||"null"); } catch { return null; } },
  setUser:  (u)  => localStorage.setItem("sas_user", JSON.stringify(u)),
  clear:    ()   => { localStorage.removeItem("sas_token"); localStorage.removeItem("sas_user"); },
};

// ── API CLIENT ───────────────────────────────────────────────
async function apiFetch(method, path, body, auth=false) {
  const headers = { "Content-Type": "application/json" };
  if (auth) {
    const token = AuthStore.getToken();
    if (token) headers["Authorization"] = "Bearer " + token;
  }
  const res = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ── DEVICE ID (browser fingerprint) ─────────────────────────
function getDeviceId() {
  let id = localStorage.getItem("sas_device");
  if (!id) {
    const raw = [navigator.userAgent, screen.width, screen.height, navigator.language,
                 navigator.hardwareConcurrency||0, new Date().getTimezoneOffset()].join("|");
    let h = 0;
    for (let i=0;i<raw.length;i++) { h=(h<<5)-h+raw.charCodeAt(i); h|=0; }
    id = "dev_" + Math.abs(h).toString(36) + "_" + Date.now().toString(36);
    localStorage.setItem("sas_device", id);
  }
  return id;
}

// ── GPS: Multi-sample collection ────────────────────────────
function collectGPSSamples(count=3, intervalMs=2000) {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject("GPS not supported");
    const samples = [];
    let attempts = 0;
    const collect = () => {
      navigator.geolocation.getCurrentPosition(
        pos => {
          samples.push({ lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy });
          attempts++;
          if (attempts < count) setTimeout(collect, intervalMs);
          else resolve(samples);
        },
        err => reject(["Permission denied","GPS unavailable","GPS timed out"][err.code-1]||"GPS error"),
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    };
    collect();
  });
}

// ── COMPONENTS ───────────────────────────────────────────────
function Alert({ type, icon, msg }) {
  if (!msg) return null;
  return React.createElement("div", { className: `alert ${type}` },
    React.createElement("span", { className: "alert-icon" }, icon),
    React.createElement("span", null, msg)
  );
}

function SecurityBadges() {
  const chips = ["SHA-256 OTP", "JWT Auth", "Rate Limited", "GPS Verified", "Anomaly Detect"];
  return React.createElement("div", { className: "security-bar" },
    chips.map(c => React.createElement("span", { key: c, className: "sec-chip" }, c))
  );
}

function OTPTimer({ startTime, duration=60, onExpire }) {
  const [rem, setRem] = useState(duration);
  useEffect(() => {
    const iv = setInterval(() => {
      const left = Math.max(0, Math.round(duration - (Date.now()-startTime)/1000));
      setRem(left);
      if (left===0) { clearInterval(iv); onExpire&&onExpire(); }
    }, 500);
    return () => clearInterval(iv);
  }, [startTime, duration]);
  const pct = (rem/duration)*100;
  return React.createElement("div", { className: "timer-wrap" },
    React.createElement("div", { className: "timer-bar-bg" },
      React.createElement("div", { className:`timer-bar ${rem<=15?"danger":""}`, style:{width:pct+"%"} })
    ),
    React.createElement("div", { className: "timer-text" }, rem+"s remaining")
  );
}

function OTPDigitInput({ onComplete, disabled }) {
  const [digits, setDigits] = useState(["","","","","",""]);
  const refs = useRef([]);
  const handle = (i, val) => {
    if (!/^\d?$/.test(val)) return;
    const next=[...digits]; next[i]=val; setDigits(next);
    if (val && i<5) refs.current[i+1]?.focus();
    if (next.every(d=>d)) onComplete(next.join(""));
  };
  const handleKey = (i, e) => { if (e.key==="Backspace"&&!digits[i]&&i>0) refs.current[i-1]?.focus(); };
  const handlePaste = e => {
    const p=e.clipboardData.getData("text").replace(/\D/g,"").slice(0,6);
    if (p.length===6) { setDigits(p.split("")); onComplete(p); }
  };
  return React.createElement("div", { className: "otp-input-row" },
    digits.map((d,i) => React.createElement("input", {
      key:i, ref:el=>refs.current[i]=el, className:"otp-digit",
      type:"text", inputMode:"numeric", maxLength:1, value:d, disabled,
      onChange:e=>handle(i,e.target.value), onKeyDown:e=>handleKey(i,e),
      onPaste:i===0?handlePaste:undefined,
    }))
  );
}

function AttemptDots({ used, max=3 }) {
  return React.createElement("div", { className: "attempts-bar" },
    Array.from({length:max},(_,i) =>
      React.createElement("div", { key:i, className:`attempt-dot ${i<used?"used":""}` })
    ),
    React.createElement("span", { style:{fontSize:11,color:"var(--muted)",marginLeft:6,fontFamily:"var(--mono)"} },
      `${max-used} attempt${max-used===1?"":"s"} left`
    )
  );
}

function GPSSampleProgress({ step, samples }) {
  const steps = [
    { label: "Sample 1 — initial reading",  key: 0 },
    { label: "Sample 2 — 2s later",         key: 1 },
    { label: "Sample 3 — consistency check",key: 2 },
  ];
  return React.createElement("div", null,
    React.createElement("div", { style:{fontSize:12,color:"var(--muted)",marginBottom:8,fontFamily:"var(--mono)"} },
      "Collecting 3 GPS readings to detect mock GPS..."
    ),
    steps.map(s => {
      const done = samples.length > s.key;
      const active = step === s.key && !done;
      const cls = done ? "done" : active ? "active" : "";
      return React.createElement("div", { key: s.key, className:`gps-step ${cls}` },
        React.createElement("span", { className: "gps-step-icon" }, done ? "✓" : active ? "⟳" : "○"),
        React.createElement("span", { className: "gps-step-label" }, s.label),
        done && React.createElement("span", { className: "gps-step-status" },
          samples[s.key]?.accuracy ? `±${Math.round(samples[s.key].accuracy)}m` : "ok"
        )
      );
    })
  );
}

// ── LOGIN PAGE ───────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [form, setForm]   = useState({ userId:"teacher_001", password:"" });
  const [loading, setL]   = useState(false);
  const [error, setError] = useState("");
  const sf = (k,v) => setForm(f=>({...f,[k]:v}));

  const submit = async () => {
    if (!form.userId || !form.password) { setError("Fill all fields."); return; }
    setL(true); setError("");
    try {
      const data = await apiFetch("POST", "/auth/login", { user_id: form.userId, password: form.password });
      AuthStore.setToken(data.token);
      AuthStore.setUser(data.user);
      onLogin(data.user);
    } catch(e) { setError(e.message); }
    setL(false);
  };

  return React.createElement("div", { className: "card" },
    React.createElement("div", { className: "text-center", style:{marginBottom:20} },
      React.createElement("div", { style:{fontSize:32,marginBottom:8} }, "🔐"),
      React.createElement("div", { style:{fontSize:18,fontWeight:800} }, "Teacher Login"),
      React.createElement("div", { style:{fontSize:12,color:"var(--muted)",marginTop:4} }, "JWT-secured authentication")
    ),
    React.createElement("div", { className: "field" },
      React.createElement("label", null, "Teacher ID"),
      React.createElement("input", { placeholder:"e.g. teacher_001", value:form.userId, onChange:e=>sf("userId",e.target.value) })
    ),
    React.createElement("div", { className: "field" },
      React.createElement("label", null, "Password"),
      React.createElement("input", { type:"password", placeholder:"Enter password", value:form.password,
        onChange:e=>sf("password",e.target.value),
        onKeyDown:e=>{ if(e.key==="Enter") submit(); }
      }),
      React.createElement("div", { className: "input-hint" }, "Default: teacher123 (change in production!)")
    ),
    Alert({ type:"error", icon:"✕", msg:error }),
    React.createElement("button", { className:"btn btn-primary", onClick:submit, disabled:loading },
      loading ? React.createElement("span",{className:"spinner"}) : "Login →"
    )
  );
}

// ── STUDENT PAGE ─────────────────────────────────────────────
function StudentPage() {
  const [step, setStep]     = useState("form");  // form | gps | otp | success
  const [form, setForm]     = useState({ studentId:"", studentName:"", sessionId:"" });
  const [gpsData, setGps]   = useState(null);
  const [samples, setSmp]   = useState([]);
  const [gpsStep, setGStep] = useState(0);
  const [loading, setL]     = useState(false);
  const [error, setError]   = useState("");
  const [attempts, setAtt]  = useState(0);
  const [result, setResult] = useState(null);
  const sf = (k,v) => setForm(f=>({...f,[k]:v}));

  const startGPS = async () => {
    if (!form.studentId || !form.studentName || !form.sessionId) {
      setError("Please fill all fields."); return;
    }
    setError(""); setStep("gps"); setSmp([]); setGStep(0);
    try {
      const collected = [];
      for (let i=0; i<3; i++) {
        setGStep(i);
        const pos = await new Promise((res,rej) =>
          navigator.geolocation.getCurrentPosition(
            p => res({ lat:p.coords.latitude, lon:p.coords.longitude, accuracy:p.coords.accuracy }),
            e => rej(["Permission denied","GPS unavailable","GPS timed out"][e.code-1]||"GPS error"),
            { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
          )
        );
        collected.push(pos);
        setSmp([...collected]);
        if (i<2) await new Promise(r=>setTimeout(r,2000));
      }
      setGps(collected[collected.length-1]);
      setGps(g => ({...g, samples: collected}));
      setStep("otp");
    } catch(e) { setError(String(e)); setStep("form"); }
  };

  const submit = async (otpVal) => {
    if (!gpsData) { setError("GPS data missing."); return; }
    setL(true); setError("");
    try {
      const sampleList = gpsData.samples || [];
      const data = await apiFetch("POST", "/attendance/mark", {
        session_id: parseInt(form.sessionId),
        otp: otpVal,
        lat: gpsData.lat,
        lon: gpsData.lon,
        accuracy: gpsData.accuracy,
        gps_samples: sampleList,
        student_id: form.studentId,
        student_name: form.studentName,
        device_id: getDeviceId(),
      });
      setResult(data); setStep("success");
    } catch(e) {
      setError(e.message);
      setAtt(a => a+1);
    }
    setL(false);
  };

  if (step==="success") return React.createElement("div", null,
    React.createElement("div", { className:"card text-center" },
      React.createElement("div", { className:"success-check" }, "✓"),
      React.createElement("div", { style:{fontSize:20,fontWeight:800} }, "Attendance Marked!"),
      React.createElement("div", { style:{color:"var(--muted)",fontSize:13,marginTop:6} },
        result?.student_name + " · " + result?.distance_m?.toFixed(1) + "m from classroom"
      ),
      result?.flagged && React.createElement("div",{className:"mt-12"},
        React.createElement("span",{className:"badge amber"},
          React.createElement("span",{className:"dot"}), "Flagged for review"
        )
      ),
      React.createElement("button",{className:"btn btn-outline mt-16",
        onClick:()=>{setStep("form");setGps(null);setSmp([]);setAtt(0);}
      }, "Mark Another")
    )
  );

  if (step==="gps") return React.createElement("div", null,
    React.createElement("div", { className:"card" },
      React.createElement("div", { className:"card-title" }, "Verifying GPS Location"),
      React.createElement(GPSSampleProgress, { step:gpsStep, samples }),
      React.createElement("div",{style:{marginTop:16}},
        React.createElement("button",{className:"btn btn-outline",onClick:()=>setStep("form")},"← Cancel")
      )
    )
  );

  if (step==="otp") return React.createElement("div", null,
    gpsData && React.createElement("div", { className:"gps-status" },
      React.createElement("span", null, "📍"),
      React.createElement("div", null,
        React.createElement("div",{style:{fontWeight:600,fontSize:12}},"3-Sample GPS Verified"),
        React.createElement("div",{className:"gps-coords"},
          gpsData.lat?.toFixed(5)+", "+gpsData.lon?.toFixed(5)+" · ±"+Math.round(gpsData.accuracy||0)+"m"
        )
      ),
      React.createElement("span",{className:"badge green",style:{marginLeft:"auto"}},
        React.createElement("span",{className:"dot"}), "Live"
      )
    ),
    React.createElement("div", { className:"card" },
      React.createElement("div", { className:"card-title" }, "Enter OTP"),
      React.createElement("div", { style:{fontSize:13,color:"var(--muted)",marginBottom:20} },
        "Enter the 6-digit code from the board. You have 3 attempts."
      ),
      React.createElement(OTPDigitInput, { onComplete:submit, disabled:loading }),
      attempts>0 && React.createElement(AttemptDots, { used:attempts, max:3 }),
      Alert({ type:"error", icon:"✕", msg:error }),
      loading && React.createElement("div",{style:{textAlign:"center",marginTop:16}},
        React.createElement("span",{className:"spinner"})
      ),
      React.createElement("button",{className:"btn btn-outline mt-12",onClick:()=>setStep("form")},"← Back")
    )
  );

  return React.createElement("div", null,
    React.createElement("div", { className:"card" },
      React.createElement("div", { className:"card-title" }, "Your Details"),
      React.createElement("div", { className:"field" },
        React.createElement("label", null, "Session ID"),
        React.createElement("input", {type:"number",placeholder:"From teacher",value:form.sessionId,onChange:e=>sf("sessionId",e.target.value)})
      ),
      React.createElement("div", { className:"field" },
        React.createElement("label", null, "Student ID"),
        React.createElement("input", {placeholder:"e.g. 2023CS042",value:form.studentId,onChange:e=>sf("studentId",e.target.value)})
      ),
      React.createElement("div", { className:"field" },
        React.createElement("label", null, "Full Name"),
        React.createElement("input", {placeholder:"Your full name",value:form.studentName,onChange:e=>sf("studentName",e.target.value)})
      ),
      Alert({ type:"error", icon:"✕", msg:error }),
      Alert({ type:"info", icon:"🛡", msg:"GPS will be sampled 3× to detect mock location apps." }),
      React.createElement("button",{className:"btn btn-primary",onClick:startGPS},
        "Verify Location & Continue →"
      )
    )
  );
}

// ── TEACHER PAGE ──────────────────────────────────────────────
function TeacherPage({ user, onLogout }) {
  const [view, setView]     = useState("start");
  const [session, setSession] = useState(null);
  const [otpTime, setOTime] = useState(null);
  const [records, setRec]   = useState([]);
  const [loading, setL]     = useState(false);
  const [error, setError]   = useState("");
  const [form, setForm]     = useState({ subject:"Computer Networks", lat:"28.7041", lon:"77.1025", radius:"100" });
  const sf = (k,v) => setForm(f=>({...f,[k]:v}));

  const fetchRecords = useCallback(async () => {
    if (!session) return;
    try {
      const d = await apiFetch("GET", `/attendance/list/${session.session_id}`);
      setRec(d.records||[]);
    } catch{}
  }, [session]);

  useEffect(() => {
    if (view!=="session") return;
    fetchRecords();
    const iv = setInterval(fetchRecords, 5000);
    return () => clearInterval(iv);
  }, [view, fetchRecords]);

  const startSession = async () => {
    setL(true); setError("");
    try {
      const d = await apiFetch("POST", "/session/start", {
        subject:form.subject, lat:parseFloat(form.lat), lon:parseFloat(form.lon), radius:parseInt(form.radius)
      }, true);
      setSession(d); setOTime(Date.now()); setView("session");
    } catch(e) { setError(e.message); }
    setL(false);
  };

  const refreshOTP = async () => {
    try {
      const d = await apiFetch("POST", `/session/refresh-otp/${session.session_id}`, null, true);
      setSession(s=>({...s,otp:d.otp})); setOTime(Date.now());
    } catch(e) { setError(e.message); }
  };

  const endSession = async () => {
    await apiFetch("POST", `/session/end/${session.session_id}`, null, true);
    setView("start"); setSession(null); setRec([]);
  };

  const logout = async () => {
    try { await apiFetch("POST", "/auth/logout", null, true); } catch{}
    AuthStore.clear(); onLogout();
  };

  const total=records.length, flagged=records.filter(r=>r.is_flagged).length;

  if (view==="session" && session) return React.createElement("div", null,
    React.createElement("div", { className:"user-bar" },
      React.createElement("div", null,
        React.createElement("div",{className:"user-name"},"👩‍🏫 "+user.name),
        React.createElement("div",{className:"user-role"},"JWT Authenticated")
      ),
      React.createElement("button",{className:"btn btn-outline btn-sm",onClick:logout},"Logout")
    ),
    React.createElement("div",{className:"session-pill"},
      React.createElement("div",null,
        React.createElement("div",{className:"session-info"},session.subject),
        React.createElement("div",{className:"session-meta"},"Session #"+session.session_id)
      ),
      React.createElement("span",{className:"badge green"},
        React.createElement("span",{className:"dot pulse"}), "Live"
      )
    ),
    React.createElement("div",{className:"card"},
      React.createElement("div",{className:"flex-between",style:{marginBottom:4}},
        React.createElement("div",{className:"card-title",style:{marginBottom:0}},"OTP (SHA-256 Hashed)"),
        React.createElement("button",{className:"btn btn-outline btn-sm",onClick:refreshOTP},"↻ Refresh")
      ),
      React.createElement("div",{className:"otp-display"},
        React.createElement("div",{className:"otp-number"},session.otp),
        React.createElement("div",{className:"otp-label"},"Hash stored on server — plain text shown here only")
      ),
      otpTime && React.createElement(OTPTimer,{startTime:otpTime,duration:60,onExpire:refreshOTP})
    ),
    React.createElement("div",{className:"stats-row"},
      React.createElement("div",{className:"stat-box"},
        React.createElement("div",{className:"stat-value",style:{color:"var(--accent)"}},total),
        React.createElement("div",{className:"stat-label"},"Total")
      ),
      React.createElement("div",{className:"stat-box"},
        React.createElement("div",{className:"stat-value",style:{color:"var(--green)"}},total-flagged),
        React.createElement("div",{className:"stat-label"},"Clean")
      ),
      React.createElement("div",{className:"stat-box"},
        React.createElement("div",{className:"stat-value",style:{color:"var(--red)"}},flagged),
        React.createElement("div",{className:"stat-label"},"Flagged")
      )
    ),
    records.length>0 && React.createElement("div",{className:"card"},
      React.createElement("div",{className:"card-title"},"Live Attendance"),
      React.createElement("div",{className:"list-scroll"},
        React.createElement("table",{className:"att-table"},
          React.createElement("thead",null,
            React.createElement("tr",null,
              React.createElement("th",null,"Student"),
              React.createElement("th",null,"Dist"),
              React.createElement("th",null,"Status")
            )
          ),
          React.createElement("tbody",null,
            records.map((r,i)=>
              React.createElement("tr",{key:i,className:r.is_flagged?"flagged":""},
                React.createElement("td",null,
                  React.createElement("div",{className:"student-name"},r.student_name),
                  React.createElement("div",{className:"student-id"},r.student_id)
                ),
                React.createElement("td",null,
                  React.createElement("span",{className:"dist"},r.distance?.toFixed(0)+"m")
                ),
                React.createElement("td",null,
                  r.is_flagged
                    ? React.createElement("span",{className:"badge red",title:r.flag_reason},"⚠ "+r.flag_reason?.split(",")[0])
                    : React.createElement("span",{className:"badge green"},"✓ OK")
                )
              )
            )
          )
        )
      )
    ),
    React.createElement("button",{className:"btn btn-danger mt-12",onClick:endSession},"End Session")
  );

  return React.createElement("div", null,
    React.createElement("div",{className:"user-bar"},
      React.createElement("div",null,
        React.createElement("div",{className:"user-name"},"👩‍🏫 "+user.name),
        React.createElement("div",{className:"user-role"},"Teacher · JWT Authenticated")
      ),
      React.createElement("button",{className:"btn btn-outline btn-sm",onClick:logout},"Logout")
    ),
    React.createElement("div",{className:"card"},
      React.createElement("div",{className:"card-title"},"New Session"),
      React.createElement("div",{className:"field"},
        React.createElement("label",null,"Subject"),
        React.createElement("select",{value:form.subject,onChange:e=>sf("subject",e.target.value)},
          ["Computer Networks","Data Structures","Operating Systems","DBMS","Software Engineering",
           "Machine Learning","Web Technologies","Computer Architecture"].map(s=>
            React.createElement("option",{key:s,value:s},s)
          )
        )
      ),
      React.createElement("div",{className:"field"},
        React.createElement("label",null,"Classroom Latitude"),
        React.createElement("input",{type:"number",step:"0.0001",value:form.lat,onChange:e=>sf("lat",e.target.value)})
      ),
      React.createElement("div",{className:"field"},
        React.createElement("label",null,"Classroom Longitude"),
        React.createElement("input",{type:"number",step:"0.0001",value:form.lon,onChange:e=>sf("lon",e.target.value)})
      ),
      React.createElement("div",{className:"field"},
        React.createElement("label",null,"Geofence Radius (meters)"),
        React.createElement("input",{type:"number",value:form.radius,onChange:e=>sf("radius",e.target.value)})
      ),
      Alert({type:"error",icon:"✕",msg:error}),
      React.createElement("button",{className:"btn btn-primary",onClick:startSession,disabled:loading},
        loading ? React.createElement("span",{className:"spinner"}) : "🚀 Start Session"
      )
    )
  );
}

// ── APP ROOT ──────────────────────────────────────────────────
function App() {
  const [tab, setTab]   = useState("student");
  const [user, setUser] = useState(AuthStore.getUser);

  return React.createElement("div",{className:"app"},
    React.createElement("div",{className:"header"},
      React.createElement("div",{className:"logo"},
        React.createElement("div",{className:"logo-icon"},"📡"),
        React.createElement("div",null,
          React.createElement("div",{className:"logo-text"},"SmartAttend"),
          React.createElement("div",{className:"logo-sub"},"v2 · SECURE")
        )
      ),
      React.createElement("span",{className:"badge blue"},"v2.0")
    ),
    React.createElement(SecurityBadges),
    React.createElement("div",{className:"tab-bar"},
      React.createElement("button",{className:`tab ${tab==="student"?"active":""}`,onClick:()=>setTab("student")},"👨‍🎓 Student"),
      React.createElement("button",{className:`tab ${tab==="teacher"?"active":""}`,onClick:()=>setTab("teacher")},"👩‍🏫 Teacher")
    ),
    tab==="student"
      ? React.createElement(StudentPage)
      : (user
          ? React.createElement(TeacherPage,{user,onLogout:()=>setUser(null)})
          : React.createElement(LoginPage,{onLogin:u=>{setUser(u);}})
        )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
