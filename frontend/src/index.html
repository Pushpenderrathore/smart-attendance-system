<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Attendance System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0d12;
      --surface:  #12151e;
      --card:     #181c28;
      --border:   #222840;
      --accent:   #4f8bff;
      --accent2:  #7c3aed;
      --green:    #22c55e;
      --red:      #ef4444;
      --amber:    #f59e0b;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --font:     'Syne', sans-serif;
      --mono:     'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRID BG ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    /* ── LAYOUT ── */
    .app { max-width: 480px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── HEADER ── */
    .header {
      padding: 24px 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
    .logo-sub { font-size: 10px; color: var(--muted); font-family: var(--mono); }

    /* ── TAB BAR ── */
    .tab-bar {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      margin: 16px 0 24px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      animation: fadeUp .3s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* ── OTP DISPLAY ── */
    .otp-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .otp-display::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(79,139,255,.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .otp-number {
      font-family: var(--mono);
      font-size: 52px;
      font-weight: 500;
      letter-spacing: 14px;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(79,139,255,.4);
    }
    .otp-label { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* ── TIMER BAR ── */
    .timer-wrap { margin-top: 12px; }
    .timer-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .timer-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 1s linear, background .3s;
      border-radius: 2px;
    }
    .timer-bar.danger { background: var(--red); }
    .timer-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      margin-top: 4px;
    }

    /* ── INPUTS ── */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
    }
    .field input::placeholder { color: var(--muted); }
    .field select option { background: var(--surface); }

    /* ── OTP INPUT ── */
    .otp-input-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .otp-digit {
      width: 52px; height: 60px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 24px;
      text-align: center;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .otp-digit:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,139,255,.15);
    }

    /* ── BUTTONS ── */
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: 0.5px;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-primary:hover { opacity: .9; box-shadow: 0 4px 20px rgba(79,139,255,.3); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: var(--red);
    }
    .btn-sm {
      width: auto;
      padding: 8px 16px;
      font-size: 12px;
    }

    /* ── STATUS BADGE ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .badge.green { background: rgba(34,197,94,.12); color: var(--green); }
    .badge.red   { background: rgba(239,68,68,.12);  color: var(--red);   }
    .badge.amber { background: rgba(245,158,11,.12); color: var(--amber); }
    .badge.blue  { background: rgba(79,139,255,.12); color: var(--accent); }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .dot.pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%,100% { opacity:1; }
      50%      { opacity:.3; }
    }

    /* ── ALERT ── */
    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }
    .alert.success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.2); color: var(--green); }
    .alert.error   { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: var(--red); }
    .alert.info    { background: rgba(79,139,255,.1); border: 1px solid rgba(79,139,255,.2); color: var(--accent); }
    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── STATS ROW ── */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
    }
    .stat-value { font-size: 24px; font-weight: 800; }
    .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.5px; text-transform: uppercase; }

    /* ── TABLE ── */
    .att-table { width: 100%; border-collapse: collapse; }
    .att-table th {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .att-table td {
      padding: 10px 10px;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,.04);
      vertical-align: middle;
    }
    .att-table tr:last-child td { border-bottom: none; }
    .att-table tr.flagged td { background: rgba(239,68,68,.03); }
    .student-name { font-weight: 600; }
    .student-id { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .dist { font-family: var(--mono); font-size: 12px; color: var(--muted); }

    /* ── GPS INDICATOR ── */
    .gps-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 14px;
      font-size: 13px;
    }
    .gps-coords { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    /* ── SESSION ACTIVE PILL ── */
    .session-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .session-info { font-size: 13px; font-weight: 600; }
    .session-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }

    /* ── SPINNER ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SCROLLABLE LIST ── */
    .list-scroll { max-height: 340px; overflow-y: auto; }
    .list-scroll::-webkit-scrollbar { width: 4px; }
    .list-scroll::-webkit-scrollbar-track { background: transparent; }
    .list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* ── SUCCESS ANIMATION ── */
    .success-check {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(34,197,94,.1);
      border: 2px solid rgba(34,197,94,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin: 0 auto 16px;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .text-center { text-align: center; }
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .row { display: flex; gap: 10px; }
    .row .btn { flex: 1; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }
    .gap-8 { display: flex; gap: 8px; align-items: center; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, useCallback } = React;
const API = "http://localhost:5000";

// ── HELPERS ─────────────────────────────────────────────────
async function apiFetch(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { "Content-Type": "application/json" },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

function getDeviceId() {
  let id = localStorage.getItem("sas_device");
  if (!id) {
    const raw = [navigator.userAgent, screen.width, screen.height, navigator.language].join("|");
    let h = 0;
    for (let i = 0; i < raw.length; i++) { h = (h << 5) - h + raw.charCodeAt(i); h |= 0; }
    id = "dev_" + Math.abs(h).toString(36);
    localStorage.setItem("sas_device", id);
  }
  return id;
}

function getGPS() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject("GPS not supported");
    navigator.geolocation.getCurrentPosition(
      p => resolve({ lat: p.coords.latitude, lon: p.coords.longitude, accuracy: p.coords.accuracy }),
      e => reject(["Permission denied", "GPS unavailable", "GPS timed out"][e.code - 1] || "GPS error"),
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  });
}

// ── COMPONENTS ──────────────────────────────────────────────

function Alert({ type, icon, msg }) {
  if (!msg) return null;
  return React.createElement("div", { className: `alert ${type}` },
    React.createElement("span", { className: "alert-icon" }, icon),
    React.createElement("span", null, msg)
  );
}

function OTPTimer({ startTime, duration = 60, onExpire }) {
  const [remaining, setRemaining] = useState(duration);
  useEffect(() => {
    const iv = setInterval(() => {
      const elapsed = (Date.now() - startTime) / 1000;
      const left = Math.max(0, Math.round(duration - elapsed));
      setRemaining(left);
      if (left === 0) { clearInterval(iv); onExpire && onExpire(); }
    }, 500);
    return () => clearInterval(iv);
  }, [startTime, duration]);

  const pct = (remaining / duration) * 100;
  const danger = remaining <= 15;
  return React.createElement("div", { className: "timer-wrap" },
    React.createElement("div", { className: "timer-bar-bg" },
      React.createElement("div", { className: `timer-bar ${danger ? "danger" : ""}`, style: { width: pct + "%" } })
    ),
    React.createElement("div", { className: "timer-text" }, `${remaining}s`)
  );
}

function OTPDigitInput({ onComplete }) {
  const [digits, setDigits] = useState(["","","","","",""]);
  const refs = useRef([]);

  const handle = (i, val) => {
    if (!/^\d?$/.test(val)) return;
    const next = [...digits];
    next[i] = val;
    setDigits(next);
    if (val && i < 5) refs.current[i+1]?.focus();
    if (next.every(d => d)) onComplete(next.join(""));
  };
  const handleKey = (i, e) => {
    if (e.key === "Backspace" && !digits[i] && i > 0) refs.current[i-1]?.focus();
  };
  const handlePaste = (e) => {
    const pasted = e.clipboardData.getData("text").replace(/\D/g,"").slice(0,6);
    if (pasted.length === 6) {
      setDigits(pasted.split(""));
      onComplete(pasted);
    }
  };

  return React.createElement("div", { className: "otp-input-row" },
    digits.map((d, i) =>
      React.createElement("input", {
        key: i,
        ref: el => refs.current[i] = el,
        className: "otp-digit",
        type: "text",
        inputMode: "numeric",
        maxLength: 1,
        value: d,
        onChange: e => handle(i, e.target.value),
        onKeyDown: e => handleKey(i, e),
        onPaste: i === 0 ? handlePaste : undefined,
      })
    )
  );
}

// ── STUDENT PAGE ─────────────────────────────────────────────
function StudentPage() {
  const [step, setStep] = useState("form"); // form | otp | success
  const [form, setForm] = useState({ studentId: "", studentName: "", sessionId: "" });
  const [otp, setOtp] = useState("");
  const [gps, setGps] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [result, setResult] = useState(null);

  const setField = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const fetchGPS = async () => {
    setLoading(true);
    setError("");
    try {
      const loc = await getGPS();
      setGps(loc);
    } catch (e) { setError(e); }
    setLoading(false);
  };

  const goToOTP = async () => {
    if (!form.studentId || !form.studentName || !form.sessionId) {
      setError("Please fill all fields."); return;
    }
    setError("");
    await fetchGPS();
    setStep("otp");
  };

  const submit = async (otpVal) => {
    if (!gps) { setError("GPS required. Please allow location access."); return; }
    setLoading(true); setError("");
    try {
      const data = await apiFetch("POST", "/attendance/mark", {
        session_id: parseInt(form.sessionId),
        otp: otpVal,
        lat: gps.lat,
        lon: gps.lon,
        student_id: form.studentId,
        student_name: form.studentName,
        device_id: getDeviceId(),
      });
      setResult(data);
      setStep("success");
    } catch (e) { setError(e.message); }
    setLoading(false);
  };

  if (step === "success") return React.createElement("div", null,
    React.createElement("div", { className: "card text-center" },
      React.createElement("div", { className: "success-check" }, "✓"),
      React.createElement("div", { style: { fontSize: 20, fontWeight: 800 } }, "Attendance Marked!"),
      React.createElement("div", { style: { color: "var(--muted)", fontSize: 13, marginTop: 6 } },
        result?.student_name + " — " + result?.distance_m?.toFixed(1) + "m from classroom"
      ),
      result?.flagged && React.createElement("div", { className: "mt-12" },
        React.createElement("span", { className: "badge amber" },
          React.createElement("span", { className: "dot" }), "Flagged for review"
        )
      ),
      React.createElement("div", { className: "mt-16" },
        React.createElement("button", { className: "btn btn-outline", onClick: () => { setStep("form"); setOtp(""); setGps(null); } },
          "Mark Another"
        )
      )
    )
  );

  if (step === "otp") return React.createElement("div", null,
    gps && React.createElement("div", { className: "gps-status" },
      React.createElement("span", null, "📍"),
      React.createElement("div", null,
        React.createElement("div", { style: { fontWeight: 600, fontSize: 12 } }, "GPS Acquired"),
        React.createElement("div", { className: "gps-coords" },
          gps.lat.toFixed(5) + ", " + gps.lon.toFixed(5) + " · ±" + Math.round(gps.accuracy) + "m"
        )
      ),
      React.createElement("span", { className: "badge green", style: { marginLeft: "auto" } },
        React.createElement("span", { className: "dot" }), "Live"
      )
    ),
    React.createElement("div", { className: "card" },
      React.createElement("div", { className: "card-title" }, "Enter OTP"),
      React.createElement("div", { style: { fontSize: 13, color: "var(--muted)", marginBottom: 20 } },
        "Enter the 6-digit code shown on the board. You can also paste it."
      ),
      React.createElement(OTPDigitInput, { onComplete: submit }),
      error && React.createElement(Alert, { type: "error", icon: "✕", msg: error, }),
      loading && React.createElement("div", { style: { textAlign: "center", marginTop: 16 } },
        React.createElement("span", { className: "spinner" })
      ),
      React.createElement("button", { className: "btn btn-outline mt-12", onClick: () => setStep("form") },
        "← Back"
      )
    )
  );

  return React.createElement("div", null,
    React.createElement("div", { className: "card" },
      React.createElement("div", { className: "card-title" }, "Your Details"),
      React.createElement("div", { className: "field" },
        React.createElement("label", null, "Session ID"),
        React.createElement("input", {
          type: "number", placeholder: "Enter session ID from teacher",
          value: form.sessionId, onChange: e => setField("sessionId", e.target.value)
        })
      ),
      React.createElement("div", { className: "field" },
        React.createElement("label", null, "Student ID"),
        React.createElement("input", {
          placeholder: "e.g. 2023CS042",
          value: form.studentId, onChange: e => setField("studentId", e.target.value)
        })
      ),
      React.createElement("div", { className: "field" },
        React.createElement("label", null, "Full Name"),
        React.createElement("input", {
          placeholder: "Your name",
          value: form.studentName, onChange: e => setField("studentName", e.target.value)
        })
      ),
      Alert({ type: "error", icon: "✕", msg: error }),
      Alert({ type: "info", icon: "ℹ", msg: "Your GPS location will be verified. Make sure you're inside the classroom." }),
      React.createElement("button", {
        className: "btn btn-primary",
        onClick: goToOTP,
        disabled: loading,
      }, loading ? React.createElement("span", { className: "spinner" }) : "Continue to OTP →")
    )
  );
}

// ── TEACHER PAGE ──────────────────────────────────────────────
function TeacherPage() {
  const [view, setView] = useState("start"); // start | session
  const [session, setSession] = useState(null);
  const [otpTime, setOtpTime] = useState(null);
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [form, setForm] = useState({ subject: "Computer Networks", lat: "28.7041", lon: "77.1025", radius: "100" });

  const setField = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const startSession = async () => {
    setLoading(true); setError("");
    try {
      const data = await apiFetch("POST", "/session/start", {
        teacher_id: "teacher_001",
        subject: form.subject,
        lat: parseFloat(form.lat),
        lon: parseFloat(form.lon),
        radius: parseInt(form.radius),
      });
      setSession(data);
      setOtpTime(Date.now());
      setView("session");
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  const refreshOTP = async () => {
    try {
      const data = await apiFetch("POST", `/session/refresh-otp/${session.session_id}`);
      setSession(s => ({ ...s, otp: data.otp }));
      setOtpTime(Date.now());
    } catch(e) { setError(e.message); }
  };

  const fetchRecords = useCallback(async () => {
    if (!session) return;
    try {
      const data = await apiFetch("GET", `/attendance/list/${session.session_id}`);
      setRecords(data.records || []);
    } catch(e) {}
  }, [session]);

  useEffect(() => {
    if (view !== "session") return;
    fetchRecords();
    const iv = setInterval(fetchRecords, 5000);
    return () => clearInterval(iv);
  }, [view, fetchRecords]);

  const endSession = async () => {
    await apiFetch("POST", `/session/end/${session.session_id}`);
    setView("start"); setSession(null); setRecords([]);
  };

  const total   = records.length;
  const flagged = records.filter(r => r.is_flagged).length;
  const clean   = total - flagged;

  if (view === "session" && session) return React.createElement("div", null,
    React.createElement("div", { className: "session-pill" },
      React.createElement("div", null,
        React.createElement("div", { className: "session-info" }, session.subject),
        React.createElement("div", { className: "session-meta" }, "Session #" + session.session_id)
      ),
      React.createElement("span", { className: "badge green" },
        React.createElement("span", { className: "dot pulse" }), "Active"
      )
    ),

    React.createElement("div", { className: "card" },
      React.createElement("div", { className: "flex-between", style: { marginBottom: 4 } },
        React.createElement("div", { className: "card-title", style: { marginBottom: 0 } }, "Current OTP"),
        React.createElement("button", { className: "btn btn-outline btn-sm", onClick: refreshOTP }, "↻ Refresh")
      ),
      React.createElement("div", { className: "otp-display" },
        React.createElement("div", { className: "otp-number" }, session.otp),
        React.createElement("div", { className: "otp-label" }, "Show this to students")
      ),
      otpTime && React.createElement(OTPTimer, { startTime: otpTime, duration: 60, onExpire: refreshOTP })
    ),

    React.createElement("div", { className: "stats-row" },
      React.createElement("div", { className: "stat-box" },
        React.createElement("div", { className: "stat-value", style: { color: "var(--accent)" } }, total),
        React.createElement("div", { className: "stat-label" }, "Total")
      ),
      React.createElement("div", { className: "stat-box" },
        React.createElement("div", { className: "stat-value", style: { color: "var(--green)" } }, clean),
        React.createElement("div", { className: "stat-label" }, "Clean")
      ),
      React.createElement("div", { className: "stat-box" },
        React.createElement("div", { className: "stat-value", style: { color: "var(--red)" } }, flagged),
        React.createElement("div", { className: "stat-label" }, "Flagged")
      )
    ),

    records.length > 0 && React.createElement("div", { className: "card" },
      React.createElement("div", { className: "card-title" }, "Attendance Log"),
      React.createElement("div", { className: "list-scroll" },
        React.createElement("table", { className: "att-table" },
          React.createElement("thead", null,
            React.createElement("tr", null,
              React.createElement("th", null, "Student"),
              React.createElement("th", null, "Dist"),
              React.createElement("th", null, "Status")
            )
          ),
          React.createElement("tbody", null,
            records.map((r, i) =>
              React.createElement("tr", { key: i, className: r.is_flagged ? "flagged" : "" },
                React.createElement("td", null,
                  React.createElement("div", { className: "student-name" }, r.student_name),
                  React.createElement("div", { className: "student-id" }, r.student_id)
                ),
                React.createElement("td", null,
                  React.createElement("span", { className: "dist" }, r.distance?.toFixed(0) + "m")
                ),
                React.createElement("td", null,
                  r.is_flagged
                    ? React.createElement("span", { className: "badge red" }, "⚠ Flag")
                    : React.createElement("span", { className: "badge green" }, "✓ OK")
                )
              )
            )
          )
        )
      )
    ),

    React.createElement("button", { className: "btn btn-danger mt-12", onClick: endSession }, "End Session")
  );

  // START VIEW
  return React.createElement("div", null,
    React.createElement("div", { className: "card" },
      React.createElement("div", { className: "card-title" }, "Start New Session"),
      React.createElement("div", { className: "field" },
        React.createElement("label", null, "Subject"),
        React.createElement("select", {
          value: form.subject,
          onChange: e => setField("subject", e.target.value)
        },
          ["Computer Networks", "Data Structures", "Operating Systems", "DBMS", "Software Engineering",
           "Machine Learning", "Web Technologies", "Computer Architecture"].map(s =>
            React.createElement("option", { key: s, value: s }, s)
          )
        )
      ),
      React.createElement("div", { className: "field" },
        React.createElement("label", null, "Classroom Latitude"),
        React.createElement("input", { type: "number", step: "0.0001", value: form.lat, onChange: e => setField("lat", e.target.value) })
      ),
      React.createElement("div", { className: "field" },
        React.createElement("label", null, "Classroom Longitude"),
        React.createElement("input", { type: "number", step: "0.0001", value: form.lon, onChange: e => setField("lon", e.target.value) })
      ),
      React.createElement("div", { className: "field" },
        React.createElement("label", null, "Geofence Radius (meters)"),
        React.createElement("input", { type: "number", value: form.radius, onChange: e => setField("radius", e.target.value) })
      ),
      Alert({ type: "error", icon: "✕", msg: error }),
      React.createElement("button", {
        className: "btn btn-primary",
        onClick: startSession,
        disabled: loading,
      }, loading ? React.createElement("span", { className: "spinner" }) : "🚀 Start Session")
    )
  );
}

// ── APP ROOT ──────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("student");
  return React.createElement("div", { className: "app" },
    React.createElement("div", { className: "header" },
      React.createElement("div", { className: "logo" },
        React.createElement("div", { className: "logo-icon" }, "📡"),
        React.createElement("div", null,
          React.createElement("div", { className: "logo-text" }, "SmartAttend"),
          React.createElement("div", { className: "logo-sub" }, "GPS · OTP · SECURE")
        )
      ),
      React.createElement("span", { className: "badge blue" }, "v1.0")
    ),

    React.createElement("div", { className: "tab-bar" },
      React.createElement("button", { className: `tab ${tab === "student" ? "active" : ""}`, onClick: () => setTab("student") }, "👨‍🎓 Student"),
      React.createElement("button", { className: `tab ${tab === "teacher" ? "active" : ""}`, onClick: () => setTab("teacher") }, "👩‍🏫 Teacher")
    ),

    tab === "student" ? React.createElement(StudentPage) : React.createElement(TeacherPage)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
